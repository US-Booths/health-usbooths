name: Deploy to AWS (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aws-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  S3_BUCKET: usbooths-fe-health
  CF_DISTRIBUTION_ID: EPCNZJQWVAITC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::569206841642:role/usbooths-fe-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync immutable assets
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --exclude "index.html" --exclude "*.json" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/index.html" "/*"
